<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Sales Leadership Lab Journey</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function hideDeveloperNotes() {
        document.querySelectorAll(".status-box").forEach(function (box) {
          var text = box.textContent || "";
          if (text.indexOf("다음 개발 단계") !== -1) {
            box.style.display = "none";
          }
        });
      }

      document.addEventListener("click", function (event) {
        const target = event.target instanceof Element ? event.target : null;
        const navigationButton = target?.closest(".nav-row button, .bottom-nav button");
        if (!navigationButton) return;

        window.setTimeout(function () {
          window.scrollTo({ top: 0, left: 0, behavior: "smooth" });
          document.documentElement.scrollTop = 0;
          document.body.scrollTop = 0;
          hideDeveloperNotes();
        }, 80);
      });

      document.addEventListener("DOMContentLoaded", function () {
        hideDeveloperNotes();
        var observer = new MutationObserver(hideDeveloperNotes);
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
